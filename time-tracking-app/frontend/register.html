<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.015em;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-focus {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: rgb(79, 70, 229);
        }
    </style>
    <script src="/app.js" defer></script>
</head>

<body
    class="bg-gradient-to-br from-slate-50 to-slate-200 dark:from-slate-950 dark:to-indigo-950 h-full flex items-center justify-center p-6 transition-colors duration-1000">

    <button onclick="toggleTheme()"
        class="fixed top-8 right-8 z-50 p-3.5 rounded-2xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-lg border border-white/50 dark:border-slate-700/50 shadow-lg hover:scale-110 active:scale-95 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 dark:hidden" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400 hidden dark:block" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>

    <div id="register-card"
        class="glass w-full max-w-[480px] rounded-[2.5rem] shadow-2xl p-10 relative overflow-hidden transition-all duration-700 hover:shadow-indigo-500/10 dark:hover:shadow-indigo-500/20">

        <div class="text-center mb-10">
            <div
                class="w-14 h-14 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-xl shadow-indigo-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <line x1="19" y1="8" x2="19" y2="14" />
                    <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight mb-2">Create Account</h1>
            <p class="text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                Join Time Sphere today</p>
        </div>

        <form id="register-form" class="grid grid-cols-1 gap-5">
            <div class="space-y-1.5">
                <label for="fullname"
                    class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Full
                    Name</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                    </div>
                    <input type="text" id="fullname" required
                        class="w-full pl-12 pr-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white font-medium outline-none input-focus placeholder:text-slate-400"
                        placeholder="Name">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div class="space-y-1.5">
                    <label for="reg-username"
                        class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" id="reg-username" required
                        class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white font-medium outline-none input-focus placeholder:text-slate-400"
                        placeholder="username">
                </div>
                <div class="space-y-1.5">
                    <label for="email"
                        class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Email</label>
                    <input type="email" id="email" required
                        class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white font-medium outline-none input-focus placeholder:text-slate-400"
                        placeholder="abc@bitsathy.ac.in">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5">
                <div class="space-y-1.5">
                    <label for="reg-password"
                        class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Password</label>
                    <input type="password" id="reg-password" required
                        class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white font-medium outline-none input-focus placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>
                <div class="space-y-1.5">
                    <label for="confirm-password"
                        class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">Confirm</label>
                    <input type="password" id="confirm-password" required
                        class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-2xl text-slate-900 dark:text-white font-medium outline-none input-focus placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>
            </div>

            <div id="reg-error-msg"
                class="hidden text-rose-500 text-[10px] font-bold py-2 text-center uppercase tracking-wider bg-rose-50 dark:bg-rose-900/20 rounded-xl">
            </div>

            <button type="submit" id="register-btn"
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-indigo-500/20 transition-all active:scale-95 text-xs">
                Create User
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
                Already have an account?
                <a href="/login" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline">Login</a>
            </p>
        </div>
    </div>

</body>

</html>
